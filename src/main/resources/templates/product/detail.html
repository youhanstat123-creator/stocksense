<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('상품 상세')"></head>
<body th:replace="fragments/layout :: layout('prod', ~{::content})">

<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="cardx p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="m-0 fw-bold">상품 상세</h4>
                        <div class="muted small mt-1">재고/최소재고 기준 자동 상태</div>
                    </div>
                    <a th:href="@{/product/list}" class="btn btn-outline-secondary">목록</a>
                </div>

                <div th:if="${error}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>

                <hr class="my-4">

                <div class="table-responsive">
                    <table class="table">
                        <tr><th style="width:180px;">ID</th><td th:text="${product.prodId}"></td></tr>
                        <tr><th>상품명</th><td th:text="${product.prodName}"></td></tr>
                        <tr><th>카테고리</th><td th:text="${product.category}"></td></tr>
                        <tr><th>가격</th><td th:text="${#numbers.formatInteger(product.price,0,'COMMA')} + '원'"></td></tr>
                        <tr><th>재고</th><td th:text="${product.stock}"></td></tr>
                        <tr><th>최소재고</th><td th:text="${product.minStock}"></td></tr>
                        <tr>
                            <th>상태</th>
                            <td>
                                <span class="badge-pill"
                                      th:classappend="${product.stock <= product.minStock} ? ' badge-danger' :
                                                    (${product.stock <= product.minStock + 5} ? ' badge-warn' : ' badge-ok')"
                                      th:text="${product.stock <= product.minStock} ? '위험' :
                                               (${product.stock <= product.minStock + 5} ? '주의' : '정상')">
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <th>담당자</th>
                            <td th:text="${product.manager.empName + ' (' + product.manager.empId + ') / ' + product.manager.dept}"></td>
                        </tr>
                    </table>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a class="btn btn-outline-secondary" th:href="@{/product/edit(id=${product.prodId})}">수정</a>

                    <form th:action="@{/product/delete}" method="post" class="m-0">
                        <input type="hidden" name="id" th:value="${product.prodId}">
                        <button class="btn btn-danger" type="submit" onclick="return confirm('삭제할까요?')">삭제</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
