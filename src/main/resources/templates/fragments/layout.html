<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ================= HEAD ================= -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">StockSense</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ================= THEME CSS ================= -->
    <style>
        /* ==================================================
           라이트 모드 (기본)
        ================================================== */
        :root{
            --bg:#f6f7fb;
            --card:#ffffff;
            --line:#e5e7eb;
            --text:#111827;
            --muted:#6b7280;
            --primary:#2563eb;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        .brand{ font-weight:800; }
        .muted{ color:var(--muted); }

        .cardx{
            background:var(--card);
            border:1px solid var(--line);
            border-radius:14px;
            box-shadow:0 10px 30px rgba(17,24,39,.06);
        }

        .table thead th{
            background:#f3f4f6;
            font-weight:800;
        }

        .table td, .table th{
            border-color:var(--line);
            vertical-align:middle;
        }

        .form-control, .form-select{
            background:var(--card);
            color:var(--text);
            border-radius:10px;
            border-color:var(--line);
        }

        .btn-primary{
            background:var(--primary);
            border-color:var(--primary);
        }

        /* ==================================================
           상태 BADGE (공통 / 전역)
        ================================================== */
        .badge-pill{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:4px 12px;
            min-width:56px;
            border-radius:999px;
            font-size:12px;
            font-weight:800;
            border:1px solid transparent;
            white-space:nowrap;
            line-height:1;
        }

        /* 정상 */
        .badge-ok{
            color:#0f7a3b;
            background:#e9f7ef;
            border-color:#9ddbb9;
        }

        /* ✅ 주의 (재고 경고) */
        .badge-warn{
            color:#b26a00;
            background:#fff4e5;
            border-color:#ffd199;
        }

        /* 위험 */
        .badge-danger{
            color:#c0392b;
            background:#fdecea;
            border-color:#f5b7b1;
        }

        /* 휴가 */
        .badge-info{
            color:#1f6fb2;
            background:#eaf3fb;
            border-color:#b6d4f0;
        }

        /* 휴직 */
        .badge-muted{
            color:#6c757d;
            background:#f1f3f5;
            border-color:#d6d8db;
        }

        /* 계약직 */
        .badge-amber{
            color:#b26a00;
            background:#fff4e5;
            border-color:#ffd199;
        }

        /* ==================================================
           다크 모드 (최종 / 충돌 방지)
        ================================================== */
        [data-theme="dark"]{
            --bg:#000000;
            --card:#0d1117;
            --line:#30363d;
            --text:#ffffff;
            --muted:#9da5b4;
            --primary:#58a6ff;
        }

        [data-theme="dark"] body{
            background:#000000;
            color:#ffffff;
        }

        /* NAVBAR */
        [data-theme="dark"] .navbar{
            background:#000000 !important;
            border-bottom:1px solid #30363d;
        }

        [data-theme="dark"] .navbar,
        [data-theme="dark"] .navbar a,
        [data-theme="dark"] .navbar button{
            color:#ffffff !important;
        }

        /* CARD */
        [data-theme="dark"] .cardx{
            background:#0d1117;
            border-color:#30363d;
            box-shadow:none;
        }

        /* TABLE (Bootstrap 강제 덮임 방지) */
        [data-theme="dark"] .table > :not(caption) > * > *{
            background:#0d1117 !important;
            color:#ffffff !important;
            border-color:#30363d !important;
        }

        [data-theme="dark"] .table thead th{
            background:#161b22 !important;
        }

        [data-theme="dark"] .table tbody tr:hover > *{
            background:#161b22 !important;
        }

        /* FORM */
        [data-theme="dark"] .form-control,
        [data-theme="dark"] .form-select{
            background:#0d1117;
            color:#ffffff;
            border-color:#30363d;
        }

        /* BUTTON */
        [data-theme="dark"] .btn{
            color:#ffffff;
        }

        /* ==================================================
           다크모드에서도 BADGE 색상 유지 (중요)
        ================================================== */
        [data-theme="dark"] .badge-ok{
            background:#033a27 !important;
            color:#7ce7b2 !important;
            border-color:#065f46 !important;
        }

        [data-theme="dark"] .badge-warn{
            background:#3b2a00 !important;
            color:#ffd27a !important;
            border-color:#92400e !important;
        }

        [data-theme="dark"] .badge-danger{
            background:#3a0a0a !important;
            color:#ffb4b4 !important;
            border-color:#7f1d1d !important;
        }

        [data-theme="dark"] .badge-info{
            background:#0b2a44 !important;
            color:#9fd3ff !important;
            border-color:#1e40af !important;
        }

        [data-theme="dark"] .badge-muted{
            background:#1f2933 !important;
            color:#cbd5e1 !important;
            border-color:#374151 !important;
        }

        [data-theme="dark"] .badge-amber{
            background:#3b2a00 !important;
            color:#ffd27a !important;
            border-color:#92400e !important;
        }
    </style>
</head>

<!-- ================= BODY ================= -->
<body th:fragment="layout(activeMenu, content)">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand brand" th:href="@{/}">StockSense</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activeMenu=='dash'} ? ' active' : ''"
                       th:href="@{/dashboard}">대시보드</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activeMenu=='prod'} ? ' active' : ''"
                       th:href="@{/product/list}">상품관리</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activeMenu=='emp'} ? ' active' : ''"
                       th:href="@{/emp/list}">사원관리</a>
                </li>
            </ul>

            <button id="themeToggle" class="btn btn-outline-secondary btn-sm me-3">
                🌙 다크모드
            </button>

            <span class="small text-muted" th:text="${company}">Company</span>
        </div>
    </div>
</nav>

<!-- ================= CONTENT ================= -->
<main class="container my-4" th:replace="${content}"></main>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const root = document.documentElement;
    const btn = document.getElementById("themeToggle");

    const saved = localStorage.getItem("theme");
    if(saved === "dark"){
        root.setAttribute("data-theme","dark");
        btn.innerText = "☀️ 라이트모드";
    }

    btn?.addEventListener("click", () => {
        const isDark = root.getAttribute("data-theme") === "dark";
        if(isDark){
            root.removeAttribute("data-theme");
            localStorage.setItem("theme","light");
            btn.innerText="🌙 다크모드";
        }else{
            root.setAttribute("data-theme","dark");
            localStorage.setItem("theme","dark");
            btn.innerText="☀️ 라이트모드";
        }
    });
</script>

</body>
</html>
