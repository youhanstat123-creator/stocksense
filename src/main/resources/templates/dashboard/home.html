<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('대시보드')"></head>
<body th:replace="fragments/layout :: layout('dash', ~{::content})">

<div th:fragment="content">

    <!-- ✅ 위험 상태 깜빡임 -->
    <style>
        @keyframes dangerBlink {
          0%   { opacity: 1;   transform: scale(1); }
          50%  { opacity: .25; transform: scale(1.08); }
          100% { opacity: 1;   transform: scale(1); }
        }
        /* 위험 뱃지에 blink 클래스가 붙으면 깜빡임 */
        .badge-danger.blink {
          animation: dangerBlink 1.1s infinite;
        }
    </style>

    <!-- 상단 통계 -->
    <div class="row g-3">
        <div class="col-lg-3 col-md-6">
            <div class="cardx p-3">
                <div class="muted small">총 상품</div>
                <div class="fs-3 fw-bold" th:text="${totalProducts}">0</div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="cardx p-3">
                <div class="muted small">위험</div>
                <div class="fs-3 fw-bold" th:text="${dangerCount}">0</div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="cardx p-3">
                <div class="muted small">주의</div>
                <div class="fs-3 fw-bold" th:text="${warnCount}">0</div>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="cardx p-3">
                <div class="muted small">정상</div>
                <div class="fs-3 fw-bold" th:text="${okCount}">0</div>
            </div>
        </div>
    </div>

    <!-- 위험 TOP 10 -->
    <div class="row g-3 mt-1">
        <div class="col-lg-12">
            <div class="cardx p-4">

                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3">
                    <div>
                        <h4 class="m-0 fw-bold">재고 위험 TOP 10</h4>
                        <div class="muted small mt-1">재고가 낮은 순으로 자동 정렬됩니다.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/product/list}" class="btn btn-primary">상품목록</a>
                        <a th:href="@{/emp/list}" class="btn btn-outline-secondary">사원목록</a>
                        <span class="badge-pill badge-ok">
              사원수 <span class="ms-2" th:text="${employeeCount}">0</span>
            </span>
                    </div>
                </div>

                <div class="table-responsive mt-3">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th style="width:80px;">ID</th>
                            <th>상품명</th>
                            <th style="width:120px;">카테고리</th>
                            <th style="width:90px;">재고</th>
                            <th style="width:110px;">최소재고</th>
                            <th style="width:90px;">상태</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p : ${dangerList}">
                            <td th:text="${p.prodId}">1</td>

                            <td>
                                <a class="text-decoration-none"
                                   th:href="@{/product/detail(id=${p.prodId})}"
                                   th:text="${p.prodName}">상품</a>
                            </td>

                            <td th:text="${p.category}">카테고리</td>
                            <td th:text="${p.stock}">0</td>
                            <td th:text="${p.minStock}">0</td>

                            <td>
                <span class="badge-pill"
                      th:with="stk=${T(java.lang.Integer).parseInt(p.stock + '')},
               min=${T(java.lang.Integer).parseInt(p.minStock + '')}"
                      th:classappend="${stk <= min} ? ' badge-danger blink' :
                     (${stk <= (min + 5)} ? ' badge-warn' : ' badge-ok')"
                      th:text="${stk <= min} ? '위험' :
               (${stk <= (min + 5)} ? '주의' : '정상')">
</span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(dangerList)}">
                            <td colspan="6" class="text-center muted py-5">위험 TOP 데이터가 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
